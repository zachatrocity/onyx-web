services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - api/.env.selfhost
    volumes:
      - onyx-data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      API_URL: "/api"
      APP_URL: "${APP_URL:-http://localhost:8080}"
    depends_on:
      api:
        condition: service_healthy

volumes:
  onyx-data:
